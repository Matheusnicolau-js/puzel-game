	<body>

	<script defer>
		
		const canvas = document.querySelector(".game")
		const ctx = canvas.getContext("2d") //configurando o canvas

		const pc = window.confirm("você está em um computador?")

		let direita_button = document.querySelector(".direita_button")
		let esquerda_button = document.querySelector(".esquerda_button")

		let baixo_button = document.querySelector(".baixo_button")

		let enter_button = document.querySelector(".enter_button")

		let button_trans = 0.4

		function testar_level(cena, number_cena) {

			cena()
			cena_atu = cenas[number_cena]

		}

		function draw_cube(x, y, width, height, color, alpha, contorno, stroke_color, stroke_size) {

			if (contorno == false) {

				ctx.globalAlpha = alpha
				ctx.fillStyle = color
				ctx.fillRect(x, y, width, height)	

			}else{

				ctx.globalAlpha = alpha
				ctx.fillStyle = color
				ctx.fillRect(x, y, width, height)
				ctx.strokeStyle = stroke_color
			    ctx.lineWidth = stroke_size
			    ctx.lineJoin = 'round';

			}

		}

		function draw_image(image, x, y, width, height, alpha) {

			ctx.globalAlpha = alpha
			ctx.drawImage(image, x, y, width, height)

		}

		function write_text(x, y, color, font, text, alpha, contorno, stroke_color, stroke_size) {

			if (contorno == false) {

				ctx.fillStyle = color
				ctx.globalAlpha = alpha
				ctx.font = font
				ctx.fillText(text ,x, y)

			}else{

				ctx.fillStyle = color
				ctx.globalAlpha = alpha
				ctx.font = font
				ctx.strokeStyle = stroke_color
				ctx.fillText(text ,x, y)
				ctx.lineWidth = stroke_size
				ctx.strokeText(text ,x, y)

			}

		}

		function random_munber(min, max) {
			return Math.floor(Math.random() * (max - min + 1)) + min
		}

		let pause = false

		function colisao(obj1_x, obj1_y, obj1_width, obj1_height,obj2_x, obj2_y, obj2_width, obj2_height, funcao) {

			if (
		    obj1_x < obj2_x + obj2_width &&
		    obj1_x + obj1_width > obj2_x &&
		    obj1_y < obj2_y + obj2_height &&
		    obj1_y + obj1_height > obj2_y &&
		    pause == false
		  	) {

				funcao()

			}

		}// verifica se há colisão

		function reset() {

			player.spd = 0

			if (cena_atu == cenas[2]) {

				trasi_black.trasicao = "in"
				funcao_transi = function() {

					level_1()

				transi_atu = "transicao_1"

				}

				funcao_transi = function() {

				transi_atu = "transicao_1"

		        alert("deixa o celular deitado pó")

			if (pode_trasi == true && transi_atu == "transicao_1") {

				}

				if (trasi_black.contador[1] == 81) {

				++trasi_black.contador[1]

				transicao_out_1()

				if (pause == false) {

					pause_block_black.alpha = 0

					player.prevX = player.x
					player.prevY = player.y

					if (player.x != 900-player.width) {

						if (teclas[teclas_input[0]]) {

							player.x += player.spd

						}

					}

					if (player.x != 0) {

						if (teclas[teclas_input[1]]) {

							player.x -= player.spd

						}

					}

					if (player.y != 0) {

						if (teclas[teclas_input[2]]) {

							player.y -= player.spd

						}

					}

					if (player.y != 600-player.width) {

						if (teclas[teclas_input[3]]) {

							player.y += player.spd

						}

					}

					if (teclas[teclas_input[4]]) {

						pause = true
						teclas[teclas_input[4]] = false

					}

					if (player.x != player.prevX || player.y != player.prevY || player.x != player.prevX && player.y != player.prevY) {

						console.clear()
						console.log(`X: ${player.x} -- Y: ${player.y}`)

					}

					for (let i = 0; i < obstacolos.length; ++i) {

						colisao(player.x, player.y, player.width, player.height, obstacolos[i].x, obstacolos[i].y, obstacolos[i].width, obstacolos[i].height, function () {

							if (player.prevX + player.width <= obstacolos[i].x) {

								player.x = obstacolos[i].x - player.width

							}else if (player.prevX >= obstacolos[i].x + obstacolos[i].width) {

								player.x = obstacolos[i].x + obstacolos[i].width

							}

							if (player.prevY + player.height <= obstacolos[i].y) {

								player.y = obstacolos[i].y - player.height

							}else if (player.prevY >= obstacolos[i].y + obstacolos[i].height) {

								player.y = obstacolos[i].y + obstacolos[i].height

							}

						})

					}

					if (objetos.button != undefined && objetos.button.active != true) {

						colisao(player.x, player.y, player.width, player.height, objetos.button.x, objetos.button.y, objetos.button.width, objetos.button.height, function() {

							if (teclas[teclas_input[5]]) {

								objetos.button.active = true

							}

						})

						colisao(player.x, player.y, player.width, player.height, objetos.spikes.x, objetos.spikes.y, objetos.spikes.width, objetos.spikes.height, function() {

							reset()

						})

					}

					if (objetos.purple_key != undefined && objetos.purple_key.coleted == false) {

						colisao(player.x, player.y, player.width, player.height, objetos.purple_key.x, objetos.purple_key.y, objetos.purple_key.width, objetos.purple_key.height, function() {

							if (teclas[teclas_input[5]]) {

								objetos.purple_key.coleted = true

							}

						})

						colisao(player.x, player.y, player.width, player.height, objetos.purple_door.x, objetos.purple_door.y, objetos.purple_door.width, objetos.purple_door.height, function() {

								if (player.prevX + player.width <= objetos.purple_door.x) {

									player.x = objetos.purple_door.x - player.width

								}else if (player.prevX >= objetos.purple_door.x + objetos.purple_door.width) {

									player.x = objetos.purple_door.x + objetos.purple_door.width

								}

								if (player.prevY + player.height <= objetos.purple_door.y) {

									player.y = objetos.purple_door.y - player.height

								}else if (player.prevY >= objetos.purple_door.y + objetos.purple_door.height) {

									player.y = objetos.purple_door.y + objetos.purple_door.height

								}

						})

					}

					colisao(player.x, player.y, player.width, player.height, coroa_fim.x, coroa_fim.y, coroa_fim.width, coroa_fim.height, function () {

						zerou = true
						trasi_black.trasicao = "in"
						funcao_transi = function() { cena_atu = cenas[0]
						menu()}
						transi_atu = "transicao_1"

					})
				}

			}

		}

		function loop() {

			if (pc == true) {

				document.addEventListener("keydown", e => teclas[e.key] = true)
				document.addEventListener("keyup", e => teclas[e.key] = false)//verifica se uma tecla é precionado ou não

				canvas.style.width = "900px"
				canvas.style.height = "600px"

				document.querySelector(".shift_button").style.marginLeft = "0px"
				document.querySelector(".direita_button").style.opacity = 0
				document.querySelector(".esquerda_button").style.opacity = 0
				document.querySelector(".cima_button").style.opacity = 0
				document.querySelector(".baixo_button").style.opacity = 0
				document.querySelector(".enter_button").style.opacity = 0
				document.querySelector(".shift_button").style.opacity = 0

			}else{

				canvas.style.width = "100vw"
				canvas.style.height = "auto"
				canvas.style.maxHeight = "100vh"

				document.querySelector(".direita_button").style.opacity = button_trans
				document.querySelector(".esquerda_button").style.opacity = button_trans
				document.querySelector(".cima_button").style.opacity = button_trans
				document.querySelector(".baixo_button").style.opacity = button_trans
				document.querySelector(".enter_button").style.opacity = button_trans
				document.querySelector(".shift_button").style.opacity = button_trans

				direita_button.addEventListener("touchstart", function() {teclas[teclas_input[0]] = true})
				direita_button.addEventListener("touchend", function() {teclas[teclas_input[0]] = false})

				esquerda_button.addEventListener("touchstart", function() {teclas[teclas_input[1]] = true})
				esquerda_button.addEventListener("touchend", function() {teclas[teclas_input[1]] = false})

				cima_button.addEventListener("touchstart", function() {teclas[teclas_input[2]] = true})
				cima_button.addEventListener("touchend", function() {teclas[teclas_input[2]] = false})

				baixo_button.addEventListener("touchstart", function() {teclas[teclas_input[3]] = true})
				baixo_button.addEventListener("touchend", function() {teclas[teclas_input[3]] = false})

				enter_button.addEventListener("touchstart", function() {teclas[teclas_input[4]] = true})
				enter_button.addEventListener("touchend", function() {teclas[teclas_input[4]] = false})

				shift_button.addEventListener("touchstart", function() {teclas[teclas_input[5]] = true})
				shift_button.addEventListener("touchend", function() {teclas[teclas_input[5]] = false})

			}
			
			window.addEventListener("load", verificarOrientacao);
			window.addEventListener("resize", verificarOrientacao);

			draw()
			update()
			requestAnimationFrame(loop)

		}

		menu()
		loop()

	</script>
